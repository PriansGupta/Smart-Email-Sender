<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 420px;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      }
      h2 {
        color: #667eea;
        margin-bottom: 20px;
        font-size: 24px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #333;
        font-size: 13px;
      }
      textarea,
      input {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-family: inherit;
        font-size: 13px;
        transition: border-color 0.3s ease;
      }
      textarea:focus,
      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      textarea {
        resize: vertical;
      }
      #emails {
        min-height: 100px;
      }
      #body {
        min-height: 120px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 10px;
      }
      button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
      }
      button:active:not(:disabled) {
        transform: translateY(0);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
        text-align: center;
        font-weight: 500;
        display: none;
      }
      #status.info {
        display: block;
        background-color: #e3f2fd;
        color: #1976d2;
      }
      #status.success {
        display: block;
        background-color: #e8f5e9;
        color: #388e3c;
      }
      #status.error {
        display: block;
        background-color: #ffebee;
        color: #d32f2f;
      }
      #progress {
        margin-top: 12px;
        font-size: 12px;
        color: #666;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Auto Mail Sender</h2>

      <div class="form-group">
        <label for="emails">Email Recipients (one per line):</label>
        <textarea
          id="emails"
          placeholder="email1@example.com&#10;email2@example.com&#10;email3@example.com"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" placeholder="Enter email subject" />
      </div>

      <div class="form-group">
        <label for="body">Email Body:</label>
        <textarea
          id="body"
          placeholder="Enter email body...&#10;&#10;You can use HTML for formatting."
        ></textarea>
      </div>

      <button id="sendBtn">Start Sending Emails</button>
      <div id="progress"></div>
      <div id="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
